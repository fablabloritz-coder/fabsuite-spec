# ═══════════════════════════════════════════════════════════════
#  FabLab Suite — Orchestration complète
#  Exécuter depuis le dossier fabsuite-spec/ :
#
#  cp .env.example .env      # une seule fois, ajustez les ports
#
#  Lancer toute la suite :
#    docker compose up -d --build
#
#  Lancer une seule application :
#    docker compose up -d --build fabhome
#    docker compose up -d --build fabtrack
#    docker compose up -d --build pretgo
#    docker compose up -d --build fabboard
#
#  Mettre à jour :
#    docker compose up -d --build <nom>
#
#  Arrêter tout :
#    docker compose down
#
#  Voir les logs :
#    docker compose logs -f
#    docker compose logs -f fabtrack
#
#  Structure attendue (un dossier parent commun) :
#    ~/fablab/
#    ├── FabHome/
#    ├── Fabtrack/
#    ├── PretGo/
#    ├── FabBoard/
#    └── fabsuite-spec/   ← vous êtes ici
# ═══════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────────────
  # FabHome — Hub central  (défaut : port 3001)
  # ──────────────────────────────────────────────────────────────
  fabhome:
    build: ../FabHome
    container_name: fabhome
    ports:
      - "${FABHOME_PORT:-3001}:3000"
    volumes:
      - ../FabHome/data:/app/data
      - ../FabHome/icons:/app/static/icons
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_DEBUG: "0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:3000/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 256m

  # ──────────────────────────────────────────────────────────────
  # Fabtrack — Machines & consommations  (défaut : port 5555)
  # ──────────────────────────────────────────────────────────────
  fabtrack:
    build: ../Fabtrack
    container_name: fabtrack
    ports:
      - "${FABTRACK_PORT:-5555}:5555"
    volumes:
      - ${FABTRACK_DATA_PATH:-../Fabtrack/docker-data/data}:/app/data
      - ${FABTRACK_UPLOADS_PATH:-../Fabtrack/docker-data/uploads}:/app/static/uploads
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      FLASK_DEBUG: "0"
      TZ: ${TZ:-Europe/Paris}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:5555/api/reference', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m

  # ──────────────────────────────────────────────────────────────
  # PretGo — Emprunts équipements  (défaut : port 5000)
  # ──────────────────────────────────────────────────────────────
  pretgo:
    build: ../PretGo
    container_name: pretgo
    ports:
      - "${PRETGO_PORT:-5000}:5000"
    volumes:
      - ${PRETGO_DATA_PATH:-../PretGo/docker-data/data}:/app/data
      - ${PRETGO_UPLOADS_PATH:-../PretGo/docker-data/uploads/materiel}:/app/static/uploads/materiel
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      FLASK_DEBUG: "0"
      TZ: ${TZ:-Europe/Paris}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:5000/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m

  # ──────────────────────────────────────────────────────────────
  # FabBoard — Dashboard TV  (défaut : port 5580)
  # ──────────────────────────────────────────────────────────────
  fabboard:
    build: ../FabBoard
    container_name: fabboard
    ports:
      - "${FABBOARD_PORT:-5580}:5580"
    volumes:
      - ${FABBOARD_DATA_PATH:-../FabBoard/docker-data/data}:/app/data
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-}
      FLASK_DEBUG: "0"
      TZ: ${TZ:-Europe/Paris}
      FABTRACK_URL: ${FABTRACK_URL:-http://host.docker.internal:5555}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:5580/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m
